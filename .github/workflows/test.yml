name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install build

      - name: Lint
        run: ruff check dnscurse/ tests/

      - name: Build
        run: python -m build

      - name: Run unit tests
        run: python -m pytest tests/ -m "not network" -v -s

      - name: Run integration tests (live DNS)
        continue-on-error: true
        run: python -m pytest tests/ -m "network" -v -s --timeout=30
