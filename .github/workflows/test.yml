name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check dnscurse/ tests/

      - name: Run unit tests
        run: |
          echo "╔══════════════════════════════════════════════════╗"
          echo "║  DNScurse Test Suite                             ║"
          echo "║  Tests verify DNS wire format, packet parsing,   ║"
          echo "║  and iterative resolution logic.                 ║"
          echo "║  Output explains each recursion step.            ║"
          echo "╚══════════════════════════════════════════════════╝"
          python -m pytest tests/ -m "not network" -v -s 2>&1

      - name: Run integration tests (live DNS)
        run: |
          echo "Running live DNS resolution tests..."
          python -m pytest tests/ -m "network" -v -s --timeout=30 2>&1 || true
